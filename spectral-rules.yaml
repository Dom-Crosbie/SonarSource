# SonarDemo Spectral ruleset
# Demo-focused: only owasp:api4:2019-array-limit is enforced.
# Everything else explicitly off so the exemption is the only pass/fail switch.

extends:
  - - "https://unpkg.com/@stoplight/spectral-owasp-ruleset@^1.4.2/dist/ruleset.mjs"
    - "off"

rules:
  owasp:api4:2019-array-limit: error
  owasp:api4:2019-rate-limit: "off"

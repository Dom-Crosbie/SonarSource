extends:
  - spectral:oas
  - https://unpkg.com/@stoplight/spectral-owasp-ruleset@^1.4.2/dist/ruleset.mjs

rules:
  # ── Naming & Structure ────────────────────────────────────────────────────
  sonar-path-kebab-case:
    message: "Path segments must use kebab-case (e.g. /tyre-centre, not /tyreCentre)"
    severity: error
    given: "$.paths"
    then:
      function: pattern
      functionOptions:
        match: "^(\\/([a-z0-9-]+|\\{[a-zA-Z0-9_]+\\}))*\\/?$"

  sonar-operation-id-camel-case:
    message: "operationId must be camelCase"
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete,head,options,trace]"
    then:
      field: operationId
      function: pattern
      functionOptions:
        match: "^[a-z][a-zA-Z0-9]*$"

  sonar-tag-required:
    message: "Every operation must have at least one tag"
    severity: error
    given: "$.paths[*][get,post,put,patch,delete,head,options,trace]"
    then:
      field: tags
      function: truthy

  sonar-operation-summary:
    message: "Every operation must have a summary"
    severity: error
    given: "$.paths[*][get,post,put,patch,delete,head,options,trace]"
    then:
      field: summary
      function: truthy

  sonar-operation-description:
    message: "Every operation should have a description"
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete,head,options,trace]"
    then:
      field: description
      function: truthy

  # ── Response Codes ────────────────────────────────────────────────────────
  sonar-get-must-have-200:
    message: "GET operations must define a 200 response"
    severity: error
    given: "$.paths[*].get"
    then:
      field: "responses.200"
      function: truthy

  sonar-post-must-have-201-or-200:
    message: "POST operations must define a 200 or 201 response"
    severity: error
    given: "$.paths[*].post"
    then:
      field: responses
      function: schema
      functionOptions:
        schema:
          type: object
          anyOf:
            - required: ["200"]
            - required: ["201"]

  sonar-delete-must-have-204:
    message: "DELETE operations should define a 204 response"
    severity: warn
    given: "$.paths[*].delete"
    then:
      field: "responses.204"
      function: truthy

  sonar-must-have-400:
    message: "Operations should define a 400 Bad Request response"
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: "responses.400"
      function: truthy

  sonar-must-have-401:
    message: "Operations should define a 401 Unauthorized response"
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: "responses.401"
      function: truthy

  sonar-must-have-500:
    message: "Operations must define a 500 Internal Server Error response"
    severity: error
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: "responses.500"
      function: truthy

  # ── Schema & Models ───────────────────────────────────────────────────────
  sonar-no-inline-schemas-in-responses:
    message: "Response schemas should use $ref rather than inline definitions"
    severity: warn
    given: "$.paths[*][*].responses[*].content[*].schema"
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          required: ["$ref"]

  sonar-schema-description:
    message: "Schema properties should have a description"
    severity: warn
    given: "$.components.schemas[*].properties[*]"
    then:
      field: description
      function: truthy

  sonar-schema-example:
    message: "Schema properties should include an example"
    severity: warn
    given: "$.components.schemas[*].properties[*]"
    then:
      field: example
      function: truthy

  # ── Security ──────────────────────────────────────────────────────────────
  sonar-security-defined:
    message: "Every operation must define a security requirement"
    severity: error
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: security
      function: truthy

  sonar-no-api-key-in-query:
    message: "API keys must not be passed as query parameters (use header or cookie)"
    severity: error
    given: "$.components.securitySchemes[?(@.type == 'apiKey')]"
    then:
      field: in
      function: pattern
      functionOptions:
        notMatch: "^query$"

  # ── OWASP overrides (severity promotions) ─────────────────────────────────
  # Promote OWASP warnings to errors for gates
  owasp:api1:2019-no-numeric-ids:
    severity: error

  owasp:api3:2019-define-error-responses-401:
    severity: error

  owasp:api3:2019-define-error-responses-500:
    severity: error

  owasp:api4:2019-rate-limit:
    severity: error

  owasp:api7:2019-security-hosts-https-oas3:
    severity: error

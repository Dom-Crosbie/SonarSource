openapi: "3.0.0"
info:
  title: SonarDemo API
  description: API for SonarDemo, a code verification software that triggers checks of Pull Requests based on Git SHAs.
  version: 1.3.1
servers:
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/domcrosbie-cc0/SonarDemo/1.3
  - description: SwaggerHub API Auto Mocking
    url: https://virtserverds.swaggerhub.com/domcrosbie-cc0/SonarDemo/1.3
tags:
  - name: verification
    description: Operations related to code verification and pull request checks
  - name: admin
    description: Administrative operations

paths:
  /checks:
    post:
      tags:
        - verification
      operationId: triggerCheck
      x-spectral-exemptions:
      - owasp:api4:2019-array-limit
      summary: Trigger a code verification check for a Pull Request based on Git SHA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckRequest"
      responses:
        "202":
          description: Check triggered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags:
        - verification
      operationId: listChecks
      summary: List all triggered checks with optional filtering by status
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - running
              - success
              - failure
              - cancelled
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 50
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
      responses:
        "200":
          description: A paginated list of checks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedChecksResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /checks/{checkId}:
    get:
      tags:
        - verification
      operationId: getCheckById
      summary: Retrieve details of a specific check by its ID
      parameters:
        - name: checkId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
      responses:
        "200":
          description: Check details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckDetails"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Check not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - admin
      operationId: deleteCheck
      summary: Delete a specific check by its ID
      x-spectral-exemptions:
        - owasp:api4:2019-rate-limit
      parameters:
        - name: checkId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
      responses:
        "204":
          description: Check deleted successfully
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Check not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    CheckRequest:
      type: object
      required:
        - repository
        - pullRequestId
        - gitSha
      properties:
        repository:
          type: string
          maxLength: 100
          description: Repository name or identifier
        pullRequestId:
          type: integer
          format: int32
          minimum: 1
          description: Pull Request identifier
        gitSha:
          type: string
          maxLength: 40
          pattern: "^[a-fA-F0-9]{40}$"
          description: Git SHA hash of the commit to check
        parameters:
          type: object
          description: Optional parameters for the check
          additionalProperties:
            type: string
    CheckResponse:
      type: object
      properties:
        checkId:
          type: string
          maxLength: 64
          description: Unique identifier of the triggered check
        status:
          type: string
          enum:
            - pending
            - running
            - success
            - failure
            - cancelled
          description: Current status of the check
        message:
          type: string
          description: Optional message about the check trigger result
    PaginatedChecksResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/CheckDetails"
        pagination:
          type: object
          required:
            - total
            - limit
            - offset
          properties:
            total:
              type: integer
              format: int32
              example: 100
            limit:
              type: integer
              format: int32
              example: 20
            offset:
              type: integer
              format: int32
              example: 0
            hasMore:
              type: boolean
              example: true
    CheckDetails:
      type: object
      properties:
        checkId:
          type: string
          maxLength: 64
        repository:
          type: string
          maxLength: 100
        pullRequestId:
          type: integer
          format: int32
        gitSha:
          type: string
          maxLength: 40
        status:
          type: string
          enum:
            - pending
            - running
            - success
            - failure
            - cancelled
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        resultSummary:
          type: string
          maxLength: 500
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
          maxLength: 200
  securitySchemes:
    oauth2Password:
      type: oauth2
      flows:
        password:
          tokenUrl: "http://example.com/oauth/token"
          scopes:
            write: "allows modifying resources"
            read: "allows reading resources"
security:
  - oauth2Password:
      - read
      - write